                risks: "Risco tecnológico, falhas em protocolos ou falta de adoção.",
                guarantees: "Inexistentes. Risco total do investidor. Sem regulação CVM."
            },
            {
                id: 14,
                category: "Criptoativos",
                name: "Stablecoins (ex.: USDT, USDC)",
                summary: "Criptomoedas que buscam a paridade com moedas fiduciárias (Dólar).",
                taxPF: "15% sobre o lucro líquido sobre variação cambial.",
                taxPJ: "Alíquota variável dependendo do regime tributário.",
                howToBuy: "Corretoras/exchanges e plataformas bancárias.",
                costs: "Taxas de corretagem e taxas de saque da rede.",
                risks: "Risco de crédito da emissora e transparência das reservas de lastro.",
                guarantees: "Não possui FGC. Depende das auditorias da empresa emissora."
            }
        ];

        // Estado da aplicação
        let searchTerm = "";
        let selectedCategory = "Todos";
        let expandedId = null;

        // Configurações de UI
        const categories = ["Todos", ...new Set(assetsData.map(a => a.category))];

        const getCategoryIconDetails = (cat) => {
            switch(cat) {
                case "Renda Fixa - Pública": return { name: "shield-check", color: "text-blue-500" };
                case "Renda Fixa - Privada Bancária": return { name: "building-2", color: "text-indigo-500" };
                case "Renda Fixa - Crédito Privado": return { name: "wallet", color: "text-teal-500" };
                case "Criptoativos": return { name: "coins", color: "text-orange-500" };
                case "Renda Variável": return { name: "trending-up", color: "text-green-500" };
                default: return { name: "line-chart", color: "text-gray-500" };
            }
        };

        // Funções de manipulação de estado
        window.handleSearch = (e) => {
            searchTerm = e.value;
            expandedId = null; // Fechar o accordion ao pesquisar
            render();
        };

        window.setCategory = (cat) => {
            selectedCategory = cat;
            expandedId = null; // Fechar o accordion ao mudar de categoria
            render();
        };

        window.toggleExpand = (id) => {
            expandedId = expandedId === id ? null : id;
            render();
        };

        window.clearFilters = () => {
            searchTerm = "";
            selectedCategory = "Todos";
            expandedId = null;
            render();
        };

        // Função principal de Renderização
        function render() {
            const root = document.getElementById('app-root');
            
            // Filtrar ativos
            const filteredAssets = assetsData.filter(asset => {
                const matchesSearch = asset.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      asset.summary.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === "Todos" || asset.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            // HTML Base (Header, Pesquisa, Filtros)
            let html = `
                <header class="mb-8">
                    <h1 class="text-3xl font-bold text-slate-800 mb-2">Explorador de Ativos Financeiros: Tributação, Riscos e Garantias</h1>
                    <p class="text-slate-600">Explore, compare e entenda os riscos e tributações de cada ativo financeiro.</p>
                </header>

                <div class="flex flex-col md:flex-row gap-4 mb-8">
                    <div class="relative flex-1">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                        <input 
                            type="text" 
                            placeholder="Buscar ativo ou característica..." 
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all shadow-sm"
                            value="${searchTerm}"
                            oninput="handleSearch(this)"
                        />
                    </div>
                    <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0 no-scrollbar">
                        ${categories.map(cat => `
                            <button
                                onclick="setCategory('${cat}')"
                                class="px-4 py-2 rounded-full whitespace-nowrap text-sm font-medium transition-all ${
                                    selectedCategory === cat 
                                    ? "bg-blue-600 text-white shadow-md shadow-blue-200" 
                                    : "bg-white text-slate-600 border border-slate-200 hover:bg-slate-100"
                                }"
                            >
                                ${cat}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;

            // HTML da Lista de Ativos
            html += `<div class="grid grid-cols-1 gap-4">`;

            if (filteredAssets.length > 0) {
                html += filteredAssets.map(asset => {
                    const isExpanded = expandedId === asset.id;
                    const iconDetails = getCategoryIconDetails(asset.category);
                    const riskWarning = asset.risks.toLowerCase().includes('altíssima') || asset.risks.toLowerCase().includes('volatilidade') 
                        ? "bg-red-50 text-red-600" 
                        : "bg-green-50 text-green-600";

                    return `
                    <div class="bg-white rounded-2xl border transition-all duration-300 ${
                        isExpanded ? "border-blue-400 ring-1 ring-blue-100 shadow-lg" : "border-slate-200 hover:shadow-md"
                    }">
                        <div class="p-5 cursor-pointer flex items-center justify-between" onclick="toggleExpand(${asset.id})">
                            <div class="flex items-center gap-4">
                                <div class="p-3 bg-slate-50 rounded-xl">
                                    <i data-lucide="${iconDetails.name}" class="${iconDetails.color}"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">${asset.category}</span>
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-800">${asset.name}</h3>
                                    <p class="text-sm text-slate-500 mt-1 line-clamp-1">${asset.summary}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="hidden md:flex flex-col items-end">
                                    <span class="text-[10px] uppercase font-bold text-slate-400">Risco</span>
                                    <span class="text-xs font-bold px-2 py-1 rounded mt-1 ${riskWarning}">
                                        ${asset.risks.split('.')[0]}
                                    </span>
                                </div>
                                <i data-lucide="${isExpanded ? 'chevron-down' : 'chevron-right'}" class="text-slate-400 w-5 h-5"></i>
                            </div>
                        </div>

                        ${isExpanded ? `
                        <div class="border-t border-slate-100 p-6 bg-slate-50/50 rounded-b-2xl animate-fade-in">
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                <section>
                                    <div class="flex items-center gap-2 text-blue-600 font-bold mb-3">
                                        <i data-lucide="wallet" class="w-4 h-4"></i>
                                        <h4>Tributação</h4>
                                    </div>
                                    <div class="space-y-3">
                                        <div class="bg-white p-3 rounded-lg border border-slate-200">
                                            <p class="text-[10px] font-bold text-slate-400 uppercase">Pessoa Física (PF)</p>
                                            <p class="text-sm text-slate-700 leading-relaxed">${asset.taxPF}</p>
                                        </div>
                                        <div class="bg-white p-3 rounded-lg border border-slate-200">
                                            <p class="text-[10px] font-bold text-slate-400 uppercase">Pessoa Jurídica (PJ)</p>
                                            <p class="text-sm text-slate-700 leading-relaxed">${asset.taxPJ}</p>
                                        </div>
                                    </div>
                                </section>

                                <section>
                                    <div class="flex items-center gap-2 text-indigo-600 font-bold mb-3">
                                        <i data-lucide="building-2" class="w-4 h-4"></i>
                                        <h4>Operacional</h4>
                                    </div>
                                    <div class="space-y-4">
                                        <div>
                                            <h5 class="text-xs font-bold text-slate-500 mb-1">Como Comprar:</h5>
                                            <p class="text-sm text-slate-700">${asset.howToBuy}</p>
                                        </div>
                                        <div>
                                            <h5 class="text-xs font-bold text-slate-500 mb-1">Custos Adicionais:</h5>
                                            <p class="text-sm text-slate-700">${asset.costs}</p>
                                        </div>
                                    </div>
                                </section>

                                <section>
                                    <div class="flex items-center gap-2 text-amber-600 font-bold mb-3">
                                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                                        <h4>Segurança</h4>
                                    </div>
                                    <div class="space-y-4">
                                        <div class="flex gap-3">
                                            <i data-lucide="alert-triangle" class="text-amber-500 shrink-0 mt-1 w-4 h-4"></i>
                                            <div>
                                                <h5 class="text-xs font-bold text-slate-500 mb-1">Principais Riscos:</h5>
                                                <p class="text-sm text-slate-700">${asset.risks}</p>
                                            </div>
                                        </div>
                                        <div class="flex gap-3">
                                            <i data-lucide="lock" class="text-blue-500 shrink-0 mt-1 w-4 h-4"></i>
                                            <div>
                                                <h5 class="text-xs font-bold text-slate-500 mb-1">Garantias:</h5>
                                                <p class="text-sm text-slate-700">${asset.guarantees}</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                    `;
                }).join('');
            } else {
                html += `
                    <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                        <div class="flex justify-center mb-4">
                            <i data-lucide="search" class="text-slate-300 w-12 h-12"></i>
                        </div>
                        <p class="text-slate-500">Nenhum ativo encontrado com esses filtros.</p>
                        <button 
                            onclick="clearFilters()"
                            class="mt-4 text-blue-600 font-medium hover:underline cursor-pointer"
                        >
                            Limpar todos os filtros
                        </button>
                    </div>
                `;
            }

            html += `</div>`;

            // Footer
            html += `
                <footer class="mt-12 text-center text-slate-400 text-xs">
                    <p>© 2026 Explorador de Ativos Financeiros - Dados baseados na Tabela Completa de Ativos.</p>
                    <p class="mt-1">Lembre-se: Rentabilidade passada não é garantia de retorno futuro.</p>
                </footer>
            `;

            // Injetar HTML no DOM
            root.innerHTML = html;

            // Renderizar os ícones do Lucide após modificar o DOM
            lucide.createIcons();

            // Garantir que o input de pesquisa não perca o foco se estava a ser utilizado
            const searchInput = document.querySelector('input[type="text"]');
            if (searchInput && document.activeElement !== searchInput && searchTerm !== "") {
                searchInput.focus();
                // Colocar o cursor no fim do texto
                const val = searchInput.value;
                searchInput.value = '';
                searchInput.value = val;
            }
        }

        // Renderização Inicial
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

    </script>
</body>
</html>
