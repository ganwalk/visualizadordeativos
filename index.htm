    <style>
        :root {
            --gold: #efbf4e;
            --gold-dark: #d4a73d;
            --gold-bg: rgba(239, 191, 78, 0.1);
            --gold-shadow: rgba(239, 191, 78, 0.25);
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.10);
            --text-primary: #18181b;
            --text-muted: #71717a;
        }

        * { font-family: 'Inter', sans-serif; }

        body {
            background-color: #F6f6f6;
        }

        /* ── Scrollbar ── */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Line-clamp ── */
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Fade-in ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }

        /* ── Cards de ativos ── */
        .asset-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .asset-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px var(--gold-shadow);
        }
        .asset-card.is-expanded {
            transform: none;
        }

        /* ── Tag de categoria ── */
        .category-tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold-dark);
            background: var(--gold-bg);
            padding: 2px 7px;
            border-radius: 4px;
            display: inline-block;
        }

        /* ── Ícone do card ── */
        .card-icon-wrap {
            background: var(--gold-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* risk badges are styled inline per asset */

        /* ── Search input ── */
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px 12px 44px;
            font-size: 15px;
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .search-input::placeholder { color: #a1a1aa; }
        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(239, 191, 78, 0.18);
        }

        /* ── Filter tabs ── */
        .filter-tab {
            padding: 7px 15px;
            border-radius: 9999px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-tab:hover {
            background: var(--gold-bg);
            border-color: var(--gold);
            color: var(--gold-dark);
        }
        .filter-tab.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #18181b;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--gold-shadow);
        }

        /* ── Painel expandido ── */
        .expanded-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.07);
            border-radius: 0 0 16px 16px;
        }

        /* ── Detail cards dentro do painel ── */
        .detail-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 12px;
        }
        .detail-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-dark);
            margin-bottom: 4px;
        }
        .detail-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ── Section headers ── */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Empty state ── */
        .empty-state {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px dashed rgba(0,0,0,0.15);
            border-radius: 16px;
        }

        /* ── Clear button ── */
        .clear-btn {
            color: var(--gold-dark);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
        }
        .clear-btn:hover { color: var(--gold); }

        /* ── Line-clamp-2 ── */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── View toggle buttons ── */
        .view-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .view-toggle-btn:hover {
            background: var(--gold-bg);
            border-color: var(--gold);
            color: var(--gold-dark);
        }
        .view-toggle-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #18181b;
            box-shadow: 0 4px 14px var(--gold-shadow);
        }
    </style>
</head>

                                    <div style="display:flex; flex-direction:column; gap:10px;">
                                        <div style="display:flex; gap:8px; align-items:flex-start;">
                                            <i data-lucide="alert-triangle" style="color:#d97706; flex-shrink:0; margin-top:1px; width:14px; height:14px;"></i>
                                            <div>
                                                <p class="detail-label">Principais Riscos</p>
                                                <p class="detail-text">${asset.risks}</p>
                                            </div>
                                        </div>
                                        <div style="display:flex; gap:8px; align-items:flex-start;">
                                            <i data-lucide="lock" style="color:var(--gold-dark); flex-shrink:0; margin-top:1px; width:14px; height:14px;"></i>
                                            <div>
                                                <p class="detail-label">Garantias</p>
                                                <p class="detail-text">${asset.guarantees}</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                            </div>
                        </div>
                        ` : ''}
                    </div>
                    `;
                }).join('');
            } else {
                html += `
                    <div class="empty-state" style="text-align:center; padding:64px 24px;">
                        <div style="display:flex; justify-content:center; margin-bottom:16px;">
                            <i data-lucide="search" style="color:#d4d4d8; width:48px; height:48px;"></i>
                        </div>
                        <p style="color:var(--text-muted); font-size:15px;">Nenhum ativo encontrado com esses filtros.</p>
                        <button onclick="clearFilters()" class="clear-btn" style="margin-top:14px; display:inline-block;">
                            Limpar todos os filtros
                        </button>
                    </div>
                `;
            }

            html += `</div>`;

            // Footer
            html += `
                <footer style="margin-top:48px; text-align:center; color:var(--text-muted); font-size:12px; opacity:0.7;">
                    <p>© 2026 Explorador de Ativos Financeiros · Dados baseados na Tabela Completa de Ativos.</p>
                    <p style="margin-top:4px;">Rentabilidade passada não é garantia de retorno futuro.</p>
                </footer>
            `;

            // Injetar HTML no DOM
            root.innerHTML = html;

            // Renderizar os ícones do Lucide após modificar o DOM
            lucide.createIcons();

            // Garantir que o input de pesquisa não perca o foco se estava a ser utilizado
            const searchInput = document.querySelector('input[type="text"]');
            if (searchInput && document.activeElement !== searchInput && searchTerm !== "") {
                searchInput.focus();
                // Colocar o cursor no fim do texto
                const val = searchInput.value;
                searchInput.value = '';
                searchInput.value = val;
            }
        }

        // Renderização Inicial
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

    </script>
</body>
</html>
